version: '3.8'

services:
  sentinel-rs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-rs
    image: sentinel-rs:latest
    ports:
      - "8080:8080"
      - "53:53/udp"
      - "53:53/tcp"
    environment:
      - RUST_LOG=info
      - SNIFFER_ENABLED=true
      - DNS_ENABLED=false
      - DNS_PORT=53
      - FIREWALL_ENABLED=true
      - INTERFACE=eth0
      # Segurança: defina estas variáveis antes de iniciar em produção!
      # SENTINEL_JWT_SECRET: segredo para assinar tokens JWT (mín. 32 chars)
      # SENTINEL_ADMIN_PASSWORD: senha do usuário admin padrão
      - SENTINEL_JWT_SECRET=${SENTINEL_JWT_SECRET:?Defina SENTINEL_JWT_SECRET com no mínimo 32 caracteres}
      - SENTINEL_ADMIN_PASSWORD=${SENTINEL_ADMIN_PASSWORD:-admin123}
    volumes:
      - sentinel-data:/app/data
      - sentinel-logs:/app/logs
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sentinel-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      # Restrito a localhost — não expõe Prometheus na rede sem autenticação
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped
    networks:
      - sentinel-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      # Exige GF_ADMIN_PASSWORD via env var — não usa senha na imagem
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:?Defina GF_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - sentinel-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      # Restrito a localhost — AlertManager não tem autenticação nativa
      - "127.0.0.1:9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - sentinel-network

volumes:
  sentinel-data:
  sentinel-logs:
  prometheus-data:
  grafana-data:
  alertmanager-data:

networks:
  sentinel-network:
    name: sentinel-network