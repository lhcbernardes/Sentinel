{% extends "base.html" %}

{% block title %}DNS Queries - Sentinel-RS{% endblock %}

{% block content %}
<div x-data="dnsQueriesManager()" x-init="init()">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
        <div class="glass-panel hover-glass rounded-xl p-5">
            <div class="text-gray-400 text-sm font-medium mb-1">Total Queries</div>
            <div class="text-3xl font-bold text-white" x-text="stats.total">0</div>
        </div>
        <div class="glass-panel hover-glass rounded-xl p-5">
            <div class="text-gray-400 text-sm font-medium mb-1">Blocked</div>
            <div class="text-3xl font-bold text-cyber-danger" x-text="stats.blocked">0</div>
        </div>
        <div class="glass-panel hover-glass rounded-xl p-5">
            <div class="text-gray-400 text-sm font-medium mb-1">Allowed</div>
            <div class="text-3xl font-bold text-cyber-success" x-text="stats.allowed">0</div>
        </div>
        <div class="glass-panel hover-glass rounded-xl p-5">
            <div class="text-gray-400 text-sm font-medium mb-1">Block Rate</div>
            <div class="text-3xl font-bold text-cyber-warn" x-text="blockRate + '%'">0%</div>
        </div>
    </div>

    <div class="glass-panel rounded-xl mb-6">
        <div class="p-5 border-b border-gray-700/50">
            <div class="flex flex-col sm:flex-row gap-4 justify-between">
                <input type="text" x-model="searchQuery" @input="filterQueries()" 
                    class="w-full max-w-md bg-gray-900/60 text-white px-4 py-2.5 rounded-lg border border-gray-700/50 focus:outline-none focus:border-cyber-primary transition-colors"
                    placeholder="Search domain...">
                <div class="flex gap-2">
                    <button @click="filterType = 'all'" 
                        class="px-4 py-2 text-sm font-medium rounded-lg transition-all"
                        :class="filterType === 'all' ? 'bg-cyber-primary text-white' : 'bg-gray-800 text-gray-400'">
                        All
                    </button>
                    <button @click="filterType = 'blocked'" 
                        class="px-4 py-2 text-sm font-medium rounded-lg transition-all"
                        :class="filterType === 'blocked' ? 'bg-cyber-danger text-white' : 'bg-gray-800 text-gray-400'">
                        Blocked
                    </button>
                    <button @click="filterType = 'allowed'" 
                        class="px-4 py-2 text-sm font-medium rounded-lg transition-all"
                        :class="filterType === 'allowed' ? 'bg-cyber-success text-white' : 'bg-gray-800 text-gray-400'">
                        Allowed
                    </button>
                </div>
            </div>
        </div>
        <div class="overflow-x-auto max-h-[500px] overflow-y-auto">
            <table class="w-full">
                <thead class="bg-gray-900/50 sticky top-0">
                    <tr>
                        <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Time</th>
                        <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Domain</th>
                        <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Client IP</th>
                        <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Response</th>
                        <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Status</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-700/30">
                    <template x-for="query in filteredQueries" :key="query.id">
                        <tr class="hover:bg-white/[0.02] transition-colors">
                            <td class="px-5 py-4 text-sm text-gray-500" x-text="formatTime(query.timestamp)"></td>
                            <td class="px-5 py-4">
                                <span class="font-mono text-sm text-gray-300" x-text="query.domain"></span>
                            </td>
                            <td class="px-5 py-4">
                                <span class="font-mono text-sm text-gray-400" x-text="query.client_ip"></span>
                            </td>
                            <td class="px-5 py-4">
                                <span class="font-mono text-sm text-gray-400" x-text="query.response || '-'"></span>
                            </td>
                            <td class="px-5 py-4">
                                <span class="px-2 py-1 text-xs font-semibold rounded"
                                    :class="query.blocked ? 'bg-cyber-danger/20 text-cyber-danger' : 'bg-cyber-success/20 text-cyber-success'"
                                    x-text="query.blocked ? 'Blocked' : 'Allowed'"></span>
                            </td>
                        </tr>
                    </template>
                    <template x-if="filteredQueries.length === 0">
                        <tr>
                            <td colspan="5" class="px-5 py-12 text-center text-gray-500">
                                No DNS queries recorded
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function dnsQueriesManager() {
    return {
        queries: [],
        filteredQueries: [],
        searchQuery: '',
        filterType: 'all',
        stats: { total: 0, blocked: 0, allowed: 0 },

        async init() {
            await this.loadQueries();
            setInterval(() => this.loadQueries(), 30000);
        },

        async loadQueries() {
            try {
                const response = await fetch('/api/v1/dns/queries');
                const data = await response.json();
                if (data.success && Array.isArray(data.data)) {
                    this.queries = data.data;
                    this.filterQueries();
                    this.updateStats();
                } else {
                    this.queries = [];
                    this.filteredQueries = [];
                    this.updateStats();
                }
            } catch (error) {
                console.error('Failed to load queries:', error);
                this.queries = [];
                this.filteredQueries = [];
                this.updateStats();
            }
        },

        filterQueries() {
            let filtered = this.queries;
            if (this.filterType === 'blocked') filtered = filtered.filter(q => q.blocked);
            else if (this.filterType === 'allowed') filtered = filtered.filter(q => !q.blocked);
            if (this.searchQuery) {
                const q = this.searchQuery.toLowerCase();
                filtered = filtered.filter(qu => qu.domain.toLowerCase().includes(q));
            }
            this.filteredQueries = filtered;
        },

        updateStats() {
            this.stats = {
                total: this.queries.length,
                blocked: this.queries.filter(q => q.blocked).length,
                allowed: this.queries.filter(q => !q.blocked).length
            };
        },

        formatTime(timestamp) {
            if (!timestamp) return '-';
            return new Date(timestamp).toLocaleTimeString();
        },

        get blockRate() {
            if (this.stats.total === 0) return 0;
            return Math.round((this.stats.blocked / this.stats.total) * 100);
        }
    }
}
</script>
{% endblock %}
