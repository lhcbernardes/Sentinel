<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <title>{% block title %}Sentinel-RS{% endblock %}</title>
    <!-- TailwindCSS v3 CDN with Custom Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif'],
                    },
                    colors: {
                        cyber: {
                            deep: '#030712',
                            dark: '#0f172a',
                            glass: 'rgba(30, 41, 59, 0.7)',
                            primary: '#22d3ee',      // Cyan 400
                            accent: '#a855f7',       // Purple 500
                            danger: '#f43f5e',       // Rose 500
                            warn: '#f59e0b',         // Amber 500
                            success: '#10b981',      // Emerald 500
                        }
                    },
                    animation: {
                        'pulse-glow': 'pulse-glow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-in': 'slide-in 0.4s cubic-bezier(0, 0, 0.2, 1) forwards',
                        'scan-line': 'scan-line 8s linear infinite',
                    },
                    keyframes: {
                        'pulse-glow': {
                            '0%, 100%': { opacity: 1, filter: 'drop-shadow(0 0 8px rgba(34, 211, 238, 0.3))' },
                            '50%': { opacity: 0.8, filter: 'drop-shadow(0 0 15px rgba(34, 211, 238, 0.6))' },
                        },
                        'slide-in': {
                            '0%': { opacity: 0, transform: 'translateY(10px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        },
                        'scan-line': {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100vh)' }
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts Outfit & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js"></script>

                }
            },
            t(key) {
                return this.translations[this.locale]?.[key] || this.translations.en[key] || key;
            },
            init() {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    el.textContent = this.t(key);
                });
            },
            setLocale(locale) {
                this.locale = locale;
                localStorage.setItem('locale', locale);
                this.init();
            }
        };
        document.addEventListener('DOMContentLoaded', () => i18n.init());

        const originalFetch = window.fetch;
        window.fetch = async function(url, options = {}) {
            const token = localStorage.getItem('auth_token');
            if (token) {
                options.headers = {
                    ...options.headers,
                    'Authorization': `Bearer ${token}`
                };
            }
            const response = await originalFetch(url, options);
            if (response.status === 401) {
                localStorage.removeItem('auth_token');
                localStorage.removeItem('user');
                window.location.href = '/login';
            }
            return response;
        };
    </script>
    <style>
        /* Base Styling & Scrollbar */
        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background-color: #030712; 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(34, 211, 238, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.08), transparent 25%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            color: #f3f4f6;
            overflow-x: hidden;
        }

        .scanline {
            width: 100%;
            height: 2px;
            z-index: 9999;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(34, 211, 238, 0.2) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1;
            position: fixed;
            pointer-events: none;
            animation: scan-line 8s linear infinite;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }

        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .hover-glass:hover {
            border-color: rgba(6, 182, 212, 0.3);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.1);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }

        .row-enter {
            animation: slide-in 0.3s ease-out forwards;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            min-width: 180px;
            z-index: 100;
        }
        .dropdown-menu.show {
            display: block;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen text-gray-100 antialiased selection:bg-cyber-primary selection:text-white">
    <div class="scanline"></div>
    <!-- Super Navbar -->
    <nav class="sticky top-0 z-50 glass-panel border-b border-gray-800/50 backdrop-blur-md px-6 py-4 shadow-lg">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center">
            <div class="flex items-center gap-3 mb-4 sm:mb-0">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-cyber-primary to-cyber-accent flex items-center justify-center font-bold text-white shadow-[0_0_20px_rgba(34,211,238,0.4)] animate-pulse-glow">
                    S
                </div>
                <div class="flex flex-col">
                    <h1 class="text-2xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-gray-200 to-gray-500 font-outfit">
                        SENTINEL<span class="text-cyber-primary">RS</span>
                    </h1>
                    <span class="text-[0.6rem] uppercase tracking-[0.2em] text-cyber-primary font-bold opacity-80" data-i18n="network_security_monitor">Network Security Monitor</span>
                </div>
            </div>
            
            <div class="flex items-center space-x-6">
                <a href="/" class="text-sm font-medium text-gray-400 hover:text-white transition-colors relative group" data-i18n="dashboard">
                    Dashboard
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-cyber-primary transition-all group-hover:w-full"></span>
                </a>
                <a href="/blocking" class="text-sm font-medium text-gray-400 hover:text-cyber-danger transition-colors relative group" data-i18n="blocking">
                    Blocking
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-cyber-danger transition-all group-hover:w-full"></span>
                </a>
                <a href="/dns-queries" class="text-sm font-medium text-gray-400 hover:text-white transition-colors relative group" data-i18n="dns_queries">
                    DNS
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-cyber-primary transition-all group-hover:w-full"></span>
                </a>
                <a href="/parental" class="text-sm font-medium text-gray-400 hover:text-cyber-warn transition-colors relative group" data-i18n="parental">
                    Parental
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-cyber-warn transition-all group-hover:w-full"></span>
                </a>
                <a href="/alert-rules" class="text-sm font-medium text-gray-400 hover:text-white transition-colors relative group" data-i18n="rules">
                    Rules
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-cyber-primary transition-all group-hover:w-full"></span>
                </a>
                <a href="/users" class="text-sm font-medium text-gray-400 hover:text-white transition-colors relative group" data-i18n="users">
                    Users
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-cyber-primary transition-all group-hover:w-full"></span>
                </a>
                <a href="/backups" class="text-sm font-medium text-gray-400 hover:text-white transition-colors relative group" data-i18n="backups">
                    Backups
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-cyber-primary transition-all group-hover:w-full"></span>
                </a>
                
                <div class="h-5 w-px bg-gray-700/50"></div>

                <div class="relative dropdown">
                    <button class="flex items-center gap-1 text-sm font-medium text-gray-400 hover:text-white transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        <span data-i18n="settings">Settings</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div class="dropdown-menu glass-panel rounded-lg shadow-xl border border-gray-700/50 py-2 mt-2">
                        <a href="/notifications" class="block px-4 py-2 text-sm text-gray-300 hover:text-white hover:bg-gray-700/50 transition-colors" data-i18n="notifications">Notifications</a>
                        <a href="/threat-intel" class="block px-4 py-2 text-sm text-gray-300 hover:text-white hover:bg-gray-700/50 transition-colors" data-i18n="threat_intel">Threat Intel</a>
                        <a href="/device-groups" class="block px-4 py-2 text-sm text-gray-300 hover:text-white hover:bg-gray-700/50 transition-colors" data-i18n="device_groups">Device Groups</a>
                        <a href="/dns-rewrite" class="block px-4 py-2 text-sm text-gray-300 hover:text-white hover:bg-gray-700/50 transition-colors" data-i18n="dns_rewrite">DNS Rewrite</a>
                        <a href="/logs" class="block px-4 py-2 text-sm text-gray-300 hover:text-white hover:bg-gray-700/50 transition-colors" data-i18n="logs">Logs</a>
                        <a href="/ml-baselines" class="block px-4 py-2 text-sm text-gray-300 hover:text-white hover:bg-gray-700/50 transition-colors" data-i18n="ml_baselines">ML Baselines</a>
                    </div>
                </div>

                <div class="h-5 w-px bg-gray-700/50"></div>

                <div id="connection-status" class="flex items-center gap-2 bg-gray-800/40 px-3 py-1.5 rounded-full border border-gray-700/50">
                    <span class="relative flex h-2 w-2">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyber-success opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-cyber-success"></span>
                    </span>
                    <span class="text-xs font-medium text-gray-300" data-i18n="live">Live</span>
                </div>
                
                <select onchange="i18n.setLocale(this.value)" class="bg-gray-800/60 text-gray-300 text-xs px-2 py-1.5 rounded border border-gray-700/50 hover:border-gray-600 focus:outline-none focus:ring-1 focus:ring-cyber-primary transition-colors cursor-pointer appearance-none">
                    <option value="en">EN</option>
                    <option value="pt">PT</option>
                    <option value="es">ES</option>
                </select>

                <button onclick="logout()" class="text-sm font-medium text-gray-400 hover:text-cyber-danger transition-colors flex items-center gap-1" title="Logout">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Viewport -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8 relative">
        {% block content %}{% endblock %}
    </main>

    <script>
        function logout() {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }

        // Dropdown toggle
        document.addEventListener('click', function(e) {
            const dropdown = e.target.closest('.dropdown');
            const allDropdowns = document.querySelectorAll('.dropdown-menu');
            
            allDropdowns.forEach(menu => menu.classList.remove('show'));
            
            if (dropdown && e.target.closest('.dropdown button')) {
                const menu = dropdown.querySelector('.dropdown-menu');
                if (menu) menu.classList.add('show');
            }
        });

        const eventSource = new EventSource('/events');

        eventSource.addEventListener('packet', (e) => {
            const data = JSON.parse(e.data);
            if (Array.isArray(data)) {
                data.forEach(p => {
                    if (typeof onPacketReceived === 'function') onPacketReceived(p);
                });
            } else {
                if (typeof onPacketReceived === 'function') onPacketReceived(data);
            }
        });

        eventSource.addEventListener('alert', (e) => {
            const a = JSON.parse(e.data);
            if (typeof onAlertReceived === 'function') onAlertReceived(a);
        });

        eventSource.onerror = () => {
            const status = document.getElementById('connection-status');
            if (status) status.innerHTML = `
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-cyber-danger rounded-full shadow-[0_0_8px_#ef4444]"></span>
                    <span class="text-xs font-medium text-cyber-danger" data-i18n="disconnected">${i18n.t('disconnected')}</span>
                </div>
            `;
        };
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
