{% extends "base.html" %}

{% block title %}Alerts - Sentinel-RS{% endblock %}

{% block content %}
<div x-data="alertManager()" x-init="init()">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
        <div class="glass-panel hover-glass rounded-xl p-5">
            <div class="text-gray-400 text-sm font-medium mb-1">Total Alerts</div>
            <div class="text-3xl font-bold text-white" x-text="alerts.length">0</div>
        </div>
        <div class="glass-panel hover-glass rounded-xl p-5">
            <div class="text-gray-400 text-sm font-medium mb-1">Critical</div>
            <div class="text-3xl font-bold text-cyber-danger" x-text="criticalCount">0</div>
        </div>
        <div class="glass-panel hover-glass rounded-xl p-5">
            <div class="text-gray-400 text-sm font-medium mb-1">Warning</div>
            <div class="text-3xl font-bold text-cyber-warn" x-text="warningCount">0</div>
        </div>
        <div class="glass-panel hover-glass rounded-xl p-5">
            <div class="text-gray-400 text-sm font-medium mb-1">Info</div>
            <div class="text-3xl font-bold text-cyber-primary" x-text="infoCount">0</div>
        </div>
    </div>

    <div class="glass-panel rounded-xl mb-6">
        <div class="p-5 border-b border-gray-700/50">
            <div class="flex flex-wrap gap-2">
                <button @click="filterSeverity('all')" 
                    class="px-4 py-2 text-sm font-medium rounded-lg transition-all"
                    :class="severityFilter === 'all' ? 'bg-cyber-primary text-white' : 'bg-gray-800 text-gray-400 hover:text-white'">
                    All
                </button>
                <button @click="filterSeverity('Critical')" 
                    class="px-4 py-2 text-sm font-medium rounded-lg transition-all"
                    :class="severityFilter === 'Critical' ? 'bg-cyber-danger text-white' : 'bg-gray-800 text-gray-400 hover:text-white'">
                    Critical
                </button>
                <button @click="filterSeverity('High')" 
                    class="px-4 py-2 text-sm font-medium rounded-lg transition-all"
                    :class="severityFilter === 'High' ? 'bg-orange-500 text-white' : 'bg-gray-800 text-gray-400 hover:text-white'">
                    High
                </button>
                <button @click="filterSeverity('Medium')" 
                    class="px-4 py-2 text-sm font-medium rounded-lg transition-all"
                    :class="severityFilter === 'Medium' ? 'bg-cyber-warn text-white' : 'bg-gray-800 text-gray-400 hover:text-white'">
                    Medium
                </button>
                <button @click="filterSeverity('Low')" 
                    class="px-4 py-2 text-sm font-medium rounded-lg transition-all"
                    :class="severityFilter === 'Low' ? 'bg-blue-500 text-white' : 'bg-gray-800 text-gray-400 hover:text-white'">
                    Low
                </button>
                <button @click="filterSeverity('Info')" 
                    class="px-4 py-2 text-sm font-medium rounded-lg transition-all"
                    :class="severityFilter === 'Info' ? 'bg-gray-500 text-white' : 'bg-gray-800 text-gray-400 hover:text-white'">
                    Info
                </button>
            </div>
        </div>
        <div class="divide-y divide-gray-700/30 max-h-[600px] overflow-y-auto">
            <template x-for="alert in filteredAlerts" :key="alert.id">
                <div class="p-5 hover:bg-white/[0.02] transition-colors cursor-pointer"
                    :class="!alert.acknowledged ? 'border-l-4 ' + getSeverityColor(alert.severity) : ''"
                    @click="showAlertDetails(alert)">
                    <div class="flex items-start gap-4">
                        <div class="flex-shrink-0 mt-1">
                            <span class="px-2 py-1 text-xs font-bold uppercase rounded" 
                                :class="getSeverityBadgeClass(alert.severity)"
                                x-text="alert.severity"></span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-sm font-semibold text-white" x-text="alert.alert_type"></span>
                                <span x-show="!alert.acknowledged" class="w-2 h-2 bg-cyber-primary rounded-full animate-pulse"></span>
                            </div>
                            <p class="text-sm text-gray-400 mb-2" x-text="alert.description"></p>
                            <div class="flex items-center gap-4 text-xs text-gray-500">
                                <span x-show="alert.source_ip">
                                    <span class="text-gray-600">Source:</span>
                                    <span class="font-mono text-gray-400" x-text="alert.source_ip"></span>
                                </span>
                                <span x-text="formatTime(alert.timestamp)"></span>
                            </div>
                        </div>
                        <div class="flex-shrink-0">
                            <button @click.stop="acknowledgeAlert(alert)" 
                                class="px-3 py-1 text-xs font-medium rounded border transition-all"
                                :class="alert.acknowledged 
                                    ? 'border-gray-700 text-gray-500' 
                                    : 'border-cyber-primary/50 text-cyber-primary hover:bg-cyber-primary/10'">
                                <span x-text="alert.acknowledged ? 'Acknowledged' : 'Acknowledge'"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </template>
            <template x-if="filteredAlerts.length === 0">
                <div class="p-12 text-center text-gray-500">
                    <svg class="w-16 h-16 mx-auto mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <p class="text-lg font-medium">No alerts</p>
                    <p class="text-sm mt-1">System is running smoothly</p>
                </div>
            </template>
        </div>
    </div>

    <div x-show="showModal" 
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm"
        @click="showModal = false"
        @keydown.escape.window="showModal = false">
        <div class="glass-panel rounded-xl max-w-lg w-full p-6" @click.stop>
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-white">Alert Details</h3>
                <button @click="showModal = false" class="text-gray-400 hover:text-white transition-colors p-1 rounded hover:bg-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div x-show="selectedAlert" class="space-y-4">
                <div class="flex items-center gap-3">
                    <span class="px-3 py-1 text-sm font-bold uppercase rounded" 
                        :class="getSeverityBadgeClass(selectedAlert.severity)"
                        x-text="selectedAlert.severity"></span>
                    <span class="text-white font-medium" x-text="selectedAlert.alert_type"></span>
                </div>
                <div class="bg-gray-900/50 rounded-lg p-4">
                    <p class="text-gray-300" x-text="selectedAlert.description"></p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wider">Alert ID</label>
                        <p class="font-mono text-sm text-gray-300" x-text="selectedAlert.id"></p>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wider">Timestamp</label>
                        <p class="text-sm text-gray-300" x-text="selectedAlert ? formatTime(selectedAlert.timestamp) : ''"></p>
                    </div>
                    <div x-show="selectedAlert.source_ip">
                        <label class="text-xs text-gray-500 uppercase tracking-wider">Source IP</label>
                        <p class="font-mono text-sm text-gray-300" x-text="selectedAlert.source_ip"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function alertManager() {
    return {
        alerts: [],
        filteredAlerts: [],
        severityFilter: 'all',
        showModal: false,
        selectedAlert: null,

        init() {
            this.loadAlerts();
            window.onAlertReceived = (alert) => {
                this.alerts.unshift(alert);
                this.filterAlerts();
            };
        },

        async loadAlerts() {
            try {
                const response = await fetch('/api/v1/alerts');
                const data = await response.json();
                if (data.success && data.data) {
                    this.alerts = data.data;
                    this.filterAlerts();
                }
            } catch (error) {
                console.error('Failed to load alerts:', error);
            }
        },

        filterSeverity(severity) {
            this.severityFilter = severity;
            this.filterAlerts();
        },

        filterAlerts() {
            if (this.severityFilter === 'all') {
                this.filteredAlerts = this.alerts;
            } else {
                this.filteredAlerts = this.alerts.filter(a => a.severity === this.severityFilter);
            }
        },

        showAlertDetails(alert) {
            this.selectedAlert = alert;
            this.showModal = true;
        },

        acknowledgeAlert(alert) {
            alert.acknowledged = true;
            this.filterAlerts();
        },

        getSeverityColor(severity) {
            const colors = {
                'Critical': 'border-l-cyber-danger',
                'High': 'border-l-orange-500',
                'Medium': 'border-l-cyber-warn',
                'Low': 'border-l-blue-500',
                'Info': 'border-l-gray-500'
            };
            return colors[severity] || 'border-l-gray-500';
        },

        getSeverityBadgeClass(severity) {
            const classes = {
                'Critical': 'bg-cyber-danger/20 text-cyber-danger border border-cyber-danger/30',
                'High': 'bg-orange-500/20 text-orange-500 border border-orange-500/30',
                'Medium': 'bg-cyber-warn/20 text-cyber-warn border border-cyber-warn/30',
                'Low': 'bg-blue-500/20 text-blue-500 border border-blue-500/30',
                'Info': 'bg-gray-500/20 text-gray-400 border border-gray-500/30'
            };
            return classes[severity] || classes['Info'];
        },

        formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return date.toLocaleString();
        },

        get criticalCount() {
            return this.alerts.filter(a => a.severity === 'Critical').length;
        },
        get warningCount() {
            return this.alerts.filter(a => ['High', 'Medium', 'Low'].includes(a.severity)).length;
        },
        get infoCount() {
            return this.alerts.filter(a => a.severity === 'Info').length;
        }
    }
}
</script>
{% endblock %}
