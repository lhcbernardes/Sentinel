{% extends "base.html" %}

{% block title %}DNS Rewrite - Sentinel-RS{% endblock %}

{% block content %}
<div x-data="dnsRewriteManager()" x-init="init()">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
        <div class="glass-panel hover-glass rounded-xl p-5">
            <div class="text-gray-400 text-sm font-medium mb-1">Total Records</div>
            <div class="text-3xl font-bold text-white" x-text="records.length">0</div>
        </div>
        <div class="glass-panel hover-glass rounded-xl p-5">
            <div class="text-gray-400 text-sm font-medium mb-1">Active</div>
            <div class="text-3xl font-bold text-cyber-success" x-text="activeCount">0</div>
        </div>
        <div class="glass-panel hover-glass rounded-xl p-5">
            <div class="text-gray-400 text-sm font-medium mb-2">DNS Server</div>
            <span class="px-3 py-1 text-xs font-bold rounded-full"
                :class="dnsEnabled ? 'bg-cyber-success/20 text-cyber-success' : 'bg-gray-700 text-gray-400'"
                x-text="dnsEnabled ? 'Running' : 'Stopped'"></span>
        </div>
    </div>

    <div class="glass-panel rounded-xl mb-6">
        <div class="p-5 border-b border-gray-700/50 flex justify-between items-center">
            <h2 class="text-lg font-semibold text-white">DNS Override Records</h2>
            <div class="flex gap-3">
                <button @click="exportRecords()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-4 py-2 rounded-lg transition-all text-sm font-medium">
                    Export
                </button>
                <button @click="openImportModal()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-4 py-2 rounded-lg transition-all text-sm font-medium">
                    Import
                </button>
                <button @click="openCreateModal()" class="bg-cyber-primary/80 hover:bg-cyber-primary text-white font-semibold px-5 py-2 rounded-lg transition-all flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                    </svg>
                    Add Record
                </button>
            </div>
        </div>
        <div class="divide-y divide-gray-700/30 max-h-[400px] overflow-y-auto">
            <template x-for="record in records" :key="record.domain">
                <div class="p-5 hover:bg-white/[0.02] transition-colors">
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-1">
                                <span class="font-mono text-white" x-text="record.domain"></span>
                                <span class="px-2 py-0.5 text-xs font-semibold rounded"
                                    :class="record.enabled ? 'bg-cyber-success/20 text-cyber-success' : 'bg-gray-700 text-gray-500'"
                                    x-text="record.enabled ? 'Active' : 'Disabled'"></span>
                            </div>
                            <div class="text-sm text-gray-400">
                                <span class="font-mono" x-text="record.ip"></span>
                                <span class="mx-2 text-gray-600">|</span>
                                <span>TTL: <span x-text="record.ttl"></span>s</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button @click="toggleRecord(record)" class="text-sm font-medium transition-colors"
                                :class="record.enabled ? 'text-cyber-warn hover:text-white' : 'text-cyber-success hover:text-white'">
                                <span x-text="record.enabled ? 'Disable' : 'Enable'"></span>
                            </button>
                            <span class="text-gray-700">|</span>
                            <button @click="openEditModal(record)" class="text-cyber-primary hover:text-white transition-colors text-sm font-medium">
                                Edit
                            </button>
                            <span class="text-gray-700">|</span>
                            <button @click="deleteRecord(record)" class="text-cyber-danger hover:text-white transition-colors text-sm font-medium">
                                Delete
                            </button>
                        </div>
                    </div>
                </div>
            </template>
            <template x-if="records.length === 0">
                <div class="p-12 text-center text-gray-500">
                    <svg class="w-12 h-12 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                    </svg>
                    <p>No DNS rewrite records configured</p>
                    <p class="text-sm mt-1">Add records to override DNS responses</p>
                </div>
            </template>
        </div>
    </div>

    <div x-show="showModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
        @click="showModal = false"
        @keydown.escape.window="showModal = false">
        <div class="glass-panel rounded-xl max-w-md w-full p-6" @click.stop>
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-semibold text-white" x-text="editingRecord ? 'Edit Record' : 'Add Record'"></h3>
                <button @click="showModal = false" class="text-gray-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <form @submit.prevent="saveRecord()" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Domain</label>
                    <input type="text" x-model="formData.domain" required
                        class="w-full bg-gray-900/60 text-white px-4 py-2.5 rounded-lg border border-gray-700/50 focus:outline-none focus:border-cyber-primary transition-colors font-mono"
                        placeholder="example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">IP Address</label>
                    <input type="text" x-model="formData.ip" required
                        class="w-full bg-gray-900/60 text-white px-4 py-2.5 rounded-lg border border-gray-700/50 focus:outline-none focus:border-cyber-primary transition-colors font-mono"
                        placeholder="192.168.1.100">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">TTL (seconds)</label>
                    <input type="number" x-model="formData.ttl" min="60" max="86400"
                        class="w-full bg-gray-900/60 text-white px-4 py-2.5 rounded-lg border border-gray-700/50 focus:outline-none focus:border-cyber-primary transition-colors"
                        placeholder="3600">
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" @click="showModal = false" class="flex-1 bg-gray-800 hover:bg-gray-700 text-gray-300 font-semibold py-2.5 rounded-lg transition-all">
                        Cancel
                    </button>
                    <button type="submit" class="flex-1 bg-cyber-primary/80 hover:bg-cyber-primary text-white font-semibold py-2.5 rounded-lg transition-all">
                        Save
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function dnsRewriteManager() {
    return {
        records: [],
        showModal: false,
        editingRecord: null,
        dnsEnabled: true,
        formData: { domain: '', ip: '', ttl: 3600 },

        async init() {
            await this.loadRecords();
        },

        async loadRecords() {
            try {
                const response = await fetch('/api/v1/dns/rewrite');
                const data = await response.json();
                if (data.success && data.data) {
                    this.records = data.data;
                }
            } catch (error) {
                console.error('Failed to load records:', error);
            }
        },

        openCreateModal() {
            this.editingRecord = null;
            this.formData = { domain: '', ip: '', ttl: 3600 };
            this.showModal = true;
        },

        openEditModal(record) {
            this.editingRecord = record;
            this.formData = { ...record };
            this.showModal = true;
        },

        async saveRecord() {
            try {
                const url = this.editingRecord 
                    ? '/api/v1/dns/rewrite/' + encodeURIComponent(this.editingRecord.domain)
                    : '/api/v1/dns/rewrite';
                const method = this.editingRecord ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(this.formData)
                });
                const data = await response.json();
                if (data.success) {
                    this.showModal = false;
                    await this.loadRecords();
                }
            } catch (error) {
                console.error('Failed to save record:', error);
            }
        },

        async toggleRecord(record) {
            record.enabled = !record.enabled;
            await this.saveRecord();
        },

        async deleteRecord(record) {
            if (!confirm('Delete record for ' + record.domain + '?')) return;
            try {
                await fetch('/api/v1/dns/rewrite/' + encodeURIComponent(record.domain), {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' }
                });
                await this.loadRecords();
            } catch (error) {
                console.error('Failed to delete record:', error);
            }
        },

        exportRecords() {
            const data = JSON.stringify(this.records, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'dns-rewrite-' + new Date().toISOString().split('T')[0] + '.json';
            a.click();
        },

        openImportModal() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const text = await file.text();
                try {
                    const records = JSON.parse(text);
                    for (const record of records) {
                        await fetch('/api/v1/dns/rewrite', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(record)
                        });
                    }
                    await this.loadRecords();
                } catch (error) {
                    alert('Failed to import: ' + error);
                }
            };
            input.click();
        },

        get activeCount() { return this.records.filter(r => r.enabled).length; }
    }
}
</script>
{% endblock %}
