{% extends "base.html" %}

{% block title %}Devices - Sentinel-RS{% endblock %}

{% block content %}
<div x-data="deviceManager()" x-init="init()">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
        <div class="glass-panel hover-glass rounded-xl p-5">
            <div class="text-gray-400 text-sm font-medium mb-1" data-i18n="total_devices">Total Devices</div>
            <div class="text-3xl font-bold text-white" x-text="devices.length">0</div>
        </div>
        <div class="glass-panel hover-glass rounded-xl p-5">
            <div class="text-gray-400 text-sm font-medium mb-1" data-i18n="online">Online</div>
            <div class="text-3xl font-bold text-cyber-success" x-text="onlineCount">0</div>
        </div>
        <div class="glass-panel hover-glass rounded-xl p-5">
            <div class="text-gray-400 text-sm font-medium mb-1" data-i18n="offline">Offline</div>
            <div class="text-3xl font-bold text-gray-500" x-text="offlineCount">0</div>
        </div>
        <div class="glass-panel hover-glass rounded-xl p-5">
            <div class="text-gray-400 text-sm font-medium mb-1" data-i18n="unknown">Unknown</div>
            <div class="text-3xl font-bold text-cyber-warn" x-text="unknownCount">0</div>
        </div>
    </div>

    <div class="glass-panel rounded-xl mb-6">
        <div class="p-5 border-b border-gray-700/50">
            <div class="flex flex-col sm:flex-row gap-4 justify-between">
                <div class="relative flex-1 max-w-md">
                    <input type="text" x-model="searchQuery" @input="filterDevices()" 
                        class="w-full bg-gray-900/60 text-white px-4 py-2.5 pl-10 rounded-lg border border-gray-700/50 focus:outline-none focus:border-cyber-primary transition-colors"
                        placeholder="Search by MAC, IP, or hostname...">
                    <svg class="absolute left-3 top-3 w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>
                <button @click="refreshDevices()" class="bg-cyber-primary/80 hover:bg-cyber-primary text-white font-semibold px-5 py-2.5 rounded-lg transition-all flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    Refresh
                </button>
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-900/50">
                    <tr>
                        <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">MAC Address</th>
                        <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">IP Address</th>
                        <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">Hostname</th>
                        <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">Vendor</th>
                        <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">First Seen</th>
                        <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">Last Seen</th>
                        <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">Status</th>
                        <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-700/30">
                    <template x-for="device in filteredDevices" :key="device.mac">
                        <tr class="hover:bg-white/[0.02] transition-colors">
                            <td class="px-5 py-4">
                                <span class="font-mono text-sm text-gray-300" x-text="device.mac"></span>
                            </td>
                            <td class="px-5 py-4">
                                <span class="font-mono text-sm text-gray-300" x-text="device.ip || '-'"></span>
                            </td>
                            <td class="px-5 py-4">
                                <span class="text-sm text-gray-300" x-text="device.hostname || '-'"></span>
                            </td>
                            <td class="px-5 py-4">
                                <span class="text-sm text-gray-400" x-text="device.vendor || 'Unknown'"></span>
                            </td>
                            <td class="px-5 py-4">
                                <span class="text-sm text-gray-500" x-text="formatTime(device.first_seen)"></span>
                            </td>
                            <td class="px-5 py-4">
                                <span class="text-sm text-gray-500" x-text="formatTime(device.last_seen)"></span>
                            </td>
                            <td class="px-5 py-4">
                                <span class="px-2 py-1 text-xs font-semibold rounded-full"
                                    :class="device.is_online ? 'bg-cyber-success/20 text-cyber-success' : 'bg-gray-700/50 text-gray-400'"
                                    x-text="device.is_online ? 'Online' : 'Offline'"></span>
                            </td>
                            <td class="px-5 py-4">
                                <button @click="showDetails(device)" class="text-cyber-primary hover:text-white transition-colors text-sm font-medium">
                                    View
                                </button>
                            </td>
                        </tr>
                    </template>
                    <template x-if="filteredDevices.length === 0">
                        <tr>
                            <td colspan="8" class="px-5 py-8 text-center text-gray-500">
                                <div class="flex flex-col items-center">
                                    <svg class="w-12 h-12 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                    </svg>
                                    <span>No devices found</span>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <div x-show="showModal" 
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm"
        @click="showModal = false"
        @keydown.escape.window="showModal = false">
        <div class="glass-panel rounded-xl max-w-lg w-full p-6" @click.stop>
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-white">Device Details</h3>
                <button @click="showModal = false" class="text-gray-400 hover:text-white transition-colors p-1 rounded hover:bg-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div x-show="selectedDevice" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wider">MAC Address</label>
                        <p class="font-mono text-sm text-white" x-text="selectedDevice?.mac"></p>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wider">IP Address</label>
                        <p class="font-mono text-sm text-white" x-text="selectedDevice?.ip || 'N/A'"></p>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wider">Hostname</label>
                        <p class="text-sm text-white" x-text="selectedDevice?.hostname || 'N/A'"></p>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wider">Vendor</label>
                        <p class="text-sm text-white" x-text="selectedDevice?.vendor || 'Unknown'"></p>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wider">First Seen</label>
                        <p class="text-sm text-white" x-text="selectedDevice ? formatTime(selectedDevice.first_seen) : ''"></p>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wider">Last Seen</label>
                        <p class="text-sm text-white" x-text="selectedDevice ? formatTime(selectedDevice.last_seen) : ''"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function deviceManager() {
    return {
        devices: [],
        filteredDevices: [],
        searchQuery: '',
        showModal: false,
        selectedDevice: null,

        async init() {
            await this.loadDevices();
            window.onPacketReceived = (packet) => {
                this.updateDeviceActivity(packet);
            };
        },

        async loadDevices() {
            try {
                const response = await fetch('/api/v1/devices');
                const data = await response.json();
                if (data.success && data.data) {
                    this.devices = data.data;
                    this.filterDevices();
                }
            } catch (error) {
                console.error('Failed to load devices:', error);
            }
        },

        filterDevices() {
            const query = this.searchQuery.toLowerCase();
            this.filteredDevices = this.devices.filter(d => 
                d.mac.toLowerCase().includes(query) ||
                (d.ip && d.ip.toLowerCase().includes(query)) ||
                (d.hostname && d.hostname.toLowerCase().includes(query))
            );
        },

        updateDeviceActivity(packet) {
            const device = this.devices.find(d => d.ip === packet.src_ip || d.ip === packet.dst_ip);
            if (device) {
                device.last_seen = new Date().toISOString();
                device.is_online = true;
            }
        },

        refreshDevices() {
            this.loadDevices();
        },

        showDetails(device) {
            this.selectedDevice = device;
            this.showModal = true;
        },

        formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return date.toLocaleString();
        },

        get onlineCount() {
            return this.devices.filter(d => d.is_online).length;
        },
        get offlineCount() {
            return this.devices.filter(d => !d.is_online).length;
        },
        get unknownCount() {
            return this.devices.filter(d => !d.is_online && !d.hostname).length;
        }
    }
}
</script>
{% endblock %}
