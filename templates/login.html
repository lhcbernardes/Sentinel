<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sentinel-RS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        cyber: {
                            deep: '#0B0F19',
                            dark: '#111827',
                            glass: '#1f293780',
                            primary: '#06b6d4',
                            accent: '#8b5cf6',
                            danger: '#ef4444',
                            warn: '#f59e0b',
                            success: '#10b981',
                        }
                    },
                    animation: {
                        'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-in': 'slide-in 0.3s ease-out',
                        'float': 'float 6s ease-in-out infinite',
                        'scan': 'scan 3s linear infinite',
                    },
                    keyframes: {
                        'pulse-glow': {
                            '0%, 100%': { opacity: 1, filter: 'brightness(1.2)' },
                            '50%': { opacity: .6, filter: 'brightness(0.8)' },
                        },
                        'slide-in': {
                            '0%': { opacity: 0, transform: 'translateY(-10px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        'scan': {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100vh)' },
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B0F19;
            overflow: hidden;
        }

        .cyber-bg {
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(6, 182, 212, 0.05) 0%, transparent 70%),
                linear-gradient(180deg, #0B0F19 0%, #111827 100%);
        }

        .grid-bg {
            background-image: 
                linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .glass-panel {
            background: linear-gradient(145deg, rgba(31, 41, 55, 0.8), rgba(17, 24, 39, 0.95));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.3),
                0 0 60px rgba(6, 182, 212, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .cyber-input {
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid rgba(75, 85, 99, 0.5);
            transition: all 0.3s ease;
        }

        .cyber-input:focus {
            border-color: rgba(6, 182, 212, 0.6);
            box-shadow: 
                0 0 0 3px rgba(6, 182, 212, 0.1),
                0 0 20px rgba(6, 182, 212, 0.15);
            outline: none;
        }

        .cyber-input::placeholder {
            color: rgba(156, 163, 175, 0.5);
        }

        .cyber-btn {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            box-shadow: 
                0 4px 15px rgba(6, 182, 212, 0.3),
                0 0 30px rgba(6, 182, 212, 0.2);
            transition: all 0.3s ease;
        }

        .cyber-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 
                0 6px 20px rgba(6, 182, 212, 0.4),
                0 0 40px rgba(6, 182, 212, 0.3);
        }

        .cyber-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .cyber-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .floating-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(6, 182, 212, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.8);
            animation: float 8s ease-in-out infinite;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.5), transparent);
            animation: scan 4s linear infinite;
        }

        .logo-glow {
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .text-glow-cyan {
            text-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
        }

        .text-glow-purple {
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        .glitch:hover {
            animation: glitch 0.3s ease-in-out;
        }

        .error-shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        .hexagon {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
    <script>
        const i18n = {
            locale: localStorage.getItem('locale') || 'en',
            translations: {
                en: {
                    welcome_back: 'Welcome Back',
                    enter_credentials: 'Enter your credentials to access the system',
                    username: 'Username',
                    password: 'Password',
                    login: 'Login',
                    logging_in: 'Logging in...',
                    login_failed: 'Login failed',
                    invalid_credentials: 'Invalid username or password',
                    network_error: 'Network error. Please try again.',
                    authentication_required: 'Authentication required to access the dashboard',
                },
                pt: {
                    welcome_back: 'Bem-vindo de Volta',
                    enter_credentials: 'Digite suas credenciais para acessar o sistema',
                    username: 'Usuário',
                    password: 'Senha',
                    login: 'Entrar',
                    logging_in: 'Entrando...',
                    login_failed: 'Falha no login',
                    invalid_credentials: 'Usuário ou senha inválidos',
                    network_error: 'Erro de rede. Tente novamente.',
                    authentication_required: 'Autenticação necessária para acessar o painel',
                },
                es: {
                    welcome_back: 'Bienvenido de Nuevo',
                    enter_credentials: 'Ingrese sus credenciales para acceder al sistema',
                    username: 'Usuario',
                    password: 'Contraseña',
                    login: 'Iniciar Sesión',
                    logging_in: 'Iniciando sesión...',
                    login_failed: 'Error de inicio de sesión',
                    invalid_credentials: 'Usuario o contraseña inválidos',
                    network_error: 'Error de red. Intente de nuevo.',
                    authentication_required: 'Se requiere autenticación para acceder al panel',
                }
            },
            t(key) {
                return this.translations[this.locale]?.[key] || this.translations.en[key] || key;
            },
            init() {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    el.textContent = this.t(key);
                });
            },
            setLocale(locale) {
                this.locale = locale;
                localStorage.setItem('locale', locale);
                this.init();
            }
        };

        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('login-btn');
            const loginText = document.getElementById('login-text');
            const spinner = document.getElementById('spinner');
            const errorContainer = document.getElementById('error-container');
            
            errorContainer.classList.add('hidden');
            loginBtn.disabled = true;
            loginText.textContent = i18n.t('logging_in');
            spinner.classList.remove('hidden');
            
            try {
                const response = await fetch('/api/v1/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password }),
                });
                
                const data = await response.json();
                
                if (data.success && data.data && data.data.token) {
                    localStorage.setItem('auth_token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    window.location.href = '/';
                } else {
                    showError(data.message || i18n.t('invalid_credentials'));
                }
            } catch (error) {
                showError(i18n.t('network_error'));
            } finally {
                loginBtn.disabled = false;
                loginText.textContent = i18n.t('login');
                spinner.classList.add('hidden');
            }
        }

        function showError(message) {
            const errorContainer = document.getElementById('error-container');
            const errorText = document.getElementById('error-text');
            const loginCard = document.getElementById('login-card');
            
            errorText.textContent = message;
            errorContainer.classList.remove('hidden');
            loginCard.classList.add('error-shake');
            
            setTimeout(() => {
                loginCard.classList.remove('error-shake');
            }, 500);
        }

        document.addEventListener('DOMContentLoaded', () => {
            i18n.init();
            
            if (localStorage.getItem('auth_token')) {
                window.location.href = '/';
            }
        });
    </script>
</head>
<body class="min-h-screen cyber-bg grid-bg text-gray-100 antialiased selection:bg-cyber-primary selection:text-white">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="floating-particle" style="left: 10%; top: 20%; animation-delay: 0s;"></div>
        <div class="floating-particle" style="left: 80%; top: 30%; animation-delay: 2s;"></div>
        <div class="floating-particle" style="left: 30%; top: 70%; animation-delay: 4s;"></div>
        <div class="floating-particle" style="left: 70%; top: 80%; animation-delay: 1s;"></div>
        <div class="floating-particle" style="left: 50%; top: 40%; animation-delay: 3s;"></div>
        <div class="floating-particle" style="left: 15%; top: 60%; animation-delay: 5s;"></div>
        <div class="floating-particle" style="left: 85%; top: 55%; animation-delay: 2.5s;"></div>
        <div class="floating-particle" style="left: 25%; top: 85%; animation-delay: 1.5s;"></div>
        <div class="scan-line" style="top: 30%;"></div>
        <div class="scan-line" style="top: 70%; animation-delay: 2s;"></div>
    </div>

    <div class="absolute top-0 left-0 w-full h-full">
        <svg class="absolute top-1/4 left-1/4 w-64 h-64 opacity-10" viewBox="0 0 200 200">
            <polygon points="100,10 190,60 190,140 100,190 10,140 10,60" fill="none" stroke="#06b6d4" stroke-width="1"/>
        </svg>
        <svg class="absolute bottom-1/4 right-1/4 w-48 h-48 opacity-10" viewBox="0 0 200 200">
            <polygon points="100,10 190,60 190,140 100,190 10,140 10,60" fill="none" stroke="#8b5cf6" stroke-width="1"/>
        </svg>
    </div>

    <div class="relative z-10 min-h-screen flex items-center justify-center px-4">
        <div id="login-card" class="w-full max-w-md">
            <div class="glass-panel rounded-2xl p-8 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyber-primary via-cyber-accent to-cyber-primary"></div>
                
                <div class="absolute -top-20 -right-20 w-40 h-40 bg-cyber-primary/10 rounded-full blur-3xl"></div>
                <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-cyber-accent/10 rounded-full blur-3xl"></div>

                <div class="relative z-10">
                    <div class="text-center mb-8">
                        <div class="inline-flex items-center justify-center w-16 h-16 mb-4 rounded-xl bg-gradient-to-br from-cyber-primary to-cyber-accent shadow-[0_0_30px_rgba(6,182,212,0.4)]">
                            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </div>
                        <h1 class="text-3xl font-bold tracking-tight mb-2">
                            <span class="bg-clip-text text-transparent bg-gradient-to-r from-gray-100 via-white to-gray-300">Sentinel</span><span class="text-cyber-primary logo-glow">-RS</span>
                        </h1>
                        <p class="text-gray-400 text-sm" data-i18n="authentication_required">Authentication required to access the dashboard</p>
                    </div>

                    <div id="error-container" class="hidden mb-6 p-4 rounded-lg bg-cyber-danger/10 border border-cyber-danger/30 text-cyber-danger text-sm">
                        <div class="flex items-center gap-2">
                            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <span id="error-text">Error message</span>
                        </div>
                    </div>

                    <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
                        <div>
                            <label for="username" class="block text-sm font-medium text-gray-300 mb-2" data-i18n="username">Username</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                    </svg>
                                </div>
                                <input type="text" id="username" name="username" required autocomplete="username"
                                    class="cyber-input w-full pl-10 pr-4 py-3 rounded-lg text-gray-100 placeholder-gray-500"
                                    placeholder="admin">
                            </div>
                        </div>

                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-300 mb-2" data-i18n="password">Password</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                    </svg>
                                </div>
                                <input type="password" id="password" name="password" required autocomplete="current-password"
                                    class="cyber-input w-full pl-10 pr-12 py-3 rounded-lg text-gray-100 placeholder-gray-500"
                                    placeholder="••••••••">
                                <button type="button" id="toggle-password" onclick="togglePasswordVisibility()"
                                    class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-300 transition-colors">
                                    <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                    </svg>
                                    <svg id="eye-off-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <button type="submit" id="login-btn"
                            class="cyber-btn w-full py-3 px-4 rounded-lg text-white font-semibold text-sm tracking-wide flex items-center justify-center gap-2 glitch">
                            <span id="login-text" data-i18n="login">Login</span>
                            <svg id="spinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                    </form>

                    <div class="mt-6 pt-6 border-t border-gray-700/50">
                        <div class="flex items-center justify-between">
                            <span class="text-xs text-gray-500">Language</span>
                            <select onchange="i18n.setLocale(this.value)" class="bg-gray-800/60 text-gray-300 text-xs px-3 py-1.5 rounded border border-gray-700/50 hover:border-gray-600 focus:outline-none focus:ring-1 focus:ring-cyber-primary transition-colors cursor-pointer appearance-none">
                                <option value="en">English</option>
                                <option value="pt">Português</option>
                                <option value="es">Español</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center mt-6">
                <p class="text-xs text-gray-600 font-mono">
                    <span class="text-cyber-primary">Sentinel-RS</span> v1.0.0 | Network Security Monitor
                </p>
            </div>
        </div>
    </div>

    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            const eyeOffIcon = document.getElementById('eye-off-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
